<!DOCTYPE html>
<html>

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Morrow Weather</title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
        <script defer src="js/app.js"></script>
        <script defer src="js/events.js"></script>
    </head>
    <body>
        <template id="template-1">
            <div class="weather-info">
                <div class="weather-thumbnail">
                    <div id="temperature-info">
                        Temperature
                    </div>
                    <img id="image">
                    <div id="date"> 
                        Today
                    </div>
                    <button id="weather-button">
                        >
                    </button>
                </div>
                <div id="forecast-info">
                    Forecast
                </div>
            </div>
        </template>

        <template id="template-2">
            <div class="square">
            </div>
        </template>

        <template id="template-3">
            <div id="error">
                Your location is unavailable!
                Only locations in the US are supported.
            </div>
        </template>

        <header>
            <h1>
                MORROW WEATHER
            </h1>
            <p>
                Made with the NWS API
            </p>
        </header>

        <div id="main">
            <div class="header">
                <div id="title">
                    <h2>
                        Today's Weather
                    </h2>
                </div>
                <div id="buttons">
                    <button id="close-main">
                        X
                    </button>
                    <button>
                        □
                    </button>
                </div>
            </div>
            <div class="inside" id="main-window-inside">
                <div class="main-data" id="today">
                    <div id="left">
                        <div id="city-state">
                        </div>
                        <div id="temperature">
                        </div>
                        <div id="date">
                        </div>
                    </div>
                    <div id="center">
                        <div id="precipitation">
                        </div>
                        <div id="wind">
                            <div id="wind-speed">

                            </div>
                            <div id="wind-direction">

                            </div>
                        </div>
                    </div>
                    <div id="right">
                        <div id="short-forecast">
                        </div>
                        <img id="main-image" alt="weather-icon">
                    </div>
                </div>
            </div>
        </div>
        <div id="forecast-hourly">
            <div class="header">
                <div id="title">
                    <h2>
                        Hourly Forecast
                    </h2>
                </div>
                <div id="buttons">
                    <button id="close-forecast-hourly">
                        X
                    </button>
                
                    <button>
                        □
                    </button>
                </div>
            </div>
            <div class="inside">
                <div class="weather-graph" id="hourly-graph"></div>
                <div class="data-array" id="hourly-forecast"></div>
            </div>
        </div>
        <div id="forecast-daily">
            <div class="header">
                <div id="title">
                    <h2>
                        Daily Forecast
                    </h2>
                </div>
                <div id="buttons">
                    <button id="close-forecast-daily">
                        X
                    </button>
                
                    <button>
                        □
                    </button>
                </div>
            </div>
            <div class="inside">
                <div class="data-array" id="daily-forecast"></div>
            </div>
        </div>
        <div id="map-container">
            <div class="header">
                <div id="title">
                    <h2>
                        Select Location
                    </h2>
                </div>
                <div id="buttons">
                    <button id="close-map-container">
                        X
                    </button>
                
                    <button>
                        □
                    </button>
                </div>
            </div>
            <div class="inside">
                <div id="map"></div>
            </div>
        </div>
    </body>
</html>
