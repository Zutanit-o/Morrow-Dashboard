<!DOCTYPE html>
<html>

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Morrow Weather Dashboard</title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
        <script src="js/app.js"></script>
        <script defer src="js/events.js"></script>
    </head>
    <body>
        <template>
            <div class="weather-info">
                <div class="weather-thumbnail">
                    <div id="temperature-info">
                        Temperature
                    </div>
                    <img id="image">
                    <div id="date"> 
                        Today
                    </div>
                    <button id="weather-button">
                        >
                    </button>
                </div>
                <div id="forecast-info">
                    Forecast
                </div>
            </div>
        </template>
        <div id="main">
            <div class="header">
                <div id="title">
                    <h1>
                        Morrow Weather
                    </h1>
                </div>
                <div id="buttons">
                    <button id="close-main">
                        X
                    </button>
                    <button>
                        □
                    </button>
                </div>
            </div>
            <div class="inside">
                <div class="main-data">
                    <div id="left">
                        <div id="city-state">
                            Clayton, MO
                        </div>
                        <div id="temperature">
                            22º
                        </div>
                        <div id="date">
                            2028
                        </div>
                    </div>
                    <div id="center">
                        <div id="precipitation">
                            Probability of Precipitation: 26%
                        </div>
                        <div id="wind">
                            Windspeed: 16mph
                        </div>
                    </div>
                    <div id="right">
                        <div id="short-forecast">
                            Mostly Sunny
                        </div>
                        <img id="main-image" alt="weather-icon">
                    </div>
                </div>
            </div>
        </div>
        <div id="forecast-daily">
            <div class="header">
                <div id="title">
                    <h2>
                        Daily Forecast
                    </h2>
                </div>
                <div id="buttons">
                    <button id="close-forecast-daily">
                        X
                    </button>
                
                    <button>
                        □
                    </button>
                </div>
            </div>
            <div class="inside">
                <div class="data-array" id="daily_forecast"></div>
            </div>
        </div>
    </body>
</html>
